{{- if .Values.database.enabled }}
# ESO resources for Maestro database credentials.
#
# The Password generator creates a stable 32-char random password on first
# install. refreshInterval: "0" means it is never rotated automatically —
# the password persists across chart upgrades.
#
# The ExternalSecret assembles the Kubernetes Secret that maestro-server mounts
# at /secrets/rds/. The keys match exactly what the maestro binary reads via
# --db-*-file flags (db.host, db.port, db.name, db.user, db.password).
# db.host defaults to localhost (Cloud SQL Auth Proxy sidecar) but is
# configurable via database.host and database.port values.

---
# Generates a stable random password; never auto-rotates
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: {{ .Values.database.passwordSecret.name }}-generator
  namespace: {{ .Release.Namespace }}
spec:
  length: 32
  digits: 8
  symbols: 8
  symbolCharacters: "-_+"
  noUpper: false
  allowRepeat: true

---
# Creates the Kubernetes Secret mounted by maestro-server at /secrets/rds/
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.database.passwordSecret.name }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: "0"
  target:
    name: {{ .Values.database.passwordSecret.name }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Raw password — consumed by SQLUser resource above
        password: "{{ `{{ .password }}` }}"
        # Individual keys read by maestro via --db-*-file flags
        db.host: {{ .Values.database.host | quote }}
        db.port: {{ .Values.database.port | quote }}
        db.name: {{ .Values.database.name | quote }}
        db.user: {{ .Values.database.user | quote }}
        db.password: "{{ `{{ .password }}` }}"
  dataFrom:
  - sourceRef:
      generatorRef:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        name: {{ .Values.database.passwordSecret.name }}-generator
{{- end }}
