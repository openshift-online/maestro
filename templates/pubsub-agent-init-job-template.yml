---
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  annotations:
    description: Job to initialize Pub/Sub agent subscriptions
    tags: pubsub,google,emulator,init,agent
  name: maestro-pubsub-agent-init
parameters:
  - name: NAMESPACE
    description: The namespace where the job will run
    required: true
    value: maestro-agent

  - name: PUBSUB_HOST
    description: Hostname for the Pub/Sub emulator service
    required: true
    value: maestro-pubsub.maestro

  - name: PUBSUB_PORT
    description: Port for the Pub/Sub emulator
    required: true
    value: "8085"

  - name: PUBSUB_PROJECT_ID
    description: Google Cloud project ID for the emulator
    required: true
    value: maestro-test

  - name: CONSUMER_NAME
    description: The consumer/cluster name for subscription filtering
    required: true

objects:
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: pubsub-agent-init-${CONSUMER_NAME}
      namespace: ${NAMESPACE}
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: init
            image: registry.access.redhat.com/ubi9/python-311
            imagePullPolicy: IfNotPresent
            env:
            - name: PUBSUB_EMULATOR_HOST
              value: "${PUBSUB_HOST}:${PUBSUB_PORT}"
            - name: PUBSUB_PROJECT_ID
              value: "${PUBSUB_PROJECT_ID}"
            - name: CONSUMER_NAME
              value: "${CONSUMER_NAME}"
            command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Installing google-cloud-pubsub..."
              pip install --quiet google-cloud-pubsub==2.34.0

              echo "Initializing Pub/Sub agent subscriptions for consumer: ${CONSUMER_NAME}..."
              python3 <<'PYTHON'
              import os
              from google.cloud import pubsub_v1
              from google.api_core import exceptions

              project_id = os.environ['PUBSUB_PROJECT_ID']
              consumer_name = os.environ['CONSUMER_NAME']

              # Create subscriber client
              subscriber = pubsub_v1.SubscriberClient()
              publisher = pubsub_v1.PublisherClient()

              # Agent subscriptions to create: (subscription_name, topic_name, filter)
              subscriptions = [
                  (
                      f'sourceevents-{consumer_name}',
                      'sourceevents',
                      f'attributes.ce-clustername="{consumer_name}"'
                  ),
                  (
                      f'sourcebroadcast-{consumer_name}',
                      'sourcebroadcast',
                      ''  # No filter for broadcast
                  )
              ]

              # Create subscriptions
              for sub_name, topic_name, filter_expr in subscriptions:
                  subscription_path = subscriber.subscription_path(project_id, sub_name)
                  topic_path = publisher.topic_path(project_id, topic_name)

                  try:
                      if filter_expr:
                          subscriber.create_subscription(
                              request={
                                  "name": subscription_path,
                                  "topic": topic_path,
                                  "filter": filter_expr
                              }
                          )
                          print(f"Created subscription: {subscription_path} with filter: {filter_expr}")
                      else:
                          subscriber.create_subscription(
                              request={
                                  "name": subscription_path,
                                  "topic": topic_path
                              }
                          )
                          print(f"Created subscription: {subscription_path}")
                  except exceptions.AlreadyExists:
                      print(f"Subscription already exists: {subscription_path}")
                  except Exception as e:
                      print(f"Error creating subscription {subscription_path}: {e}")
                      raise

              print(f"Pub/Sub agent subscriptions for '{consumer_name}' initialized successfully!")
              PYTHON
